<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Poppins', sans-serif; }
        .crystal-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .crystal-card:hover { border-color: rgba(255, 255, 255, 0.3); transform: translateY(-4px); }
    </style>
</head>
<body>
    <header class="p-6 border-b border-white/5 bg-black/80 backdrop-blur-md sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="/" class="text-xs font-bold bg-white/5 border border-white/10 px-3 py-2 rounded-md text-neutral-400 hover:text-white transition-colors">← HOME</a>
            <h1 id="catTitle" class="text-lg font-extrabold tracking-widest uppercase">COLLECTION</h1>
        </div>
    </header>

    <main class="p-6 md:p-12 max-w-7xl mx-auto">
        <div id="gridContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
    </main>

    <script>
        const catName = new URLSearchParams(window.location.search).get('c');
        document.getElementById('catTitle').textContent = catName || 'ARCHIVE';

        async function loadCategory() {
            const res = await fetch('/api/data');
            const data = await res.json();
            const grid = document.getElementById('gridContainer');
            const vids = (data.videos || []).filter(v => v.category === catName);
            
            grid.innerHTML = vids.map(v => {
                const mediaElement = v.thumb ? 
                    `<img src="${v.thumb}" class="absolute inset-0 w-full h-full object-cover" />` : 
                    `<video src="${v.url}#t=1" preload="metadata" muted playsinline class="absolute inset-0 w-full h-full object-cover"></video>`;

                return `
                <a href="/player.html?id=${v.id}" class="w-full aspect-[4/5] relative block rounded-xl overflow-hidden crystal-card">
                    ${mediaElement}
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/10 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-4 w-full">
                        <span class="inline-block px-1.5 py-0.5 bg-[#ff003c] text-white text-[8px] font-extrabold rounded mb-1.5 uppercase">${v.date || 'REEL'}</span>
                        <h3 class="text-xs font-bold truncate text-white">${v.title}</h3>
                    </div>
                </a>`;
            }).join('');
        }
        loadCategory();
    </script>
</body>
</html>
