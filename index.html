<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masoom Ki Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .neon-text { text-shadow: 0 0 10px #00e5ff; color: #00e5ff; }
        .neon-border-l { border-left: 4px solid #00e5ff; box-shadow: -5px 0 15px -5px #00e5ff; }
        .video-card { transition: all 0.3s ease; border: 1px solid transparent; }
        .video-card:hover { border-color: #00e5ff; box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); transform: translateY(-5px); }
        .slider-img { animation: fade 1.5s ease-in-out; }
        @keyframes fade { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body class="pb-20">
    <!-- Header -->
    <header class="flex justify-between items-center p-6 bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-neutral-800">
        <h1 class="text-2xl font-extrabold tracking-widest uppercase neon-text">Masoom Ki Diary</h1>
        <a href="/admin.html" class="text-sm font-semibold text-neutral-400 hover:text-[#00e5ff] transition-colors">Admin Panel</a>
    </header>

    <!-- Banner Slider (Adaptive Height) -->
    <div id="bannerContainer" class="w-full aspect-video md:h-[50vh] relative overflow-hidden bg-neutral-900 border-b border-neutral-800">
        <div class="absolute inset-0 flex items-center justify-center"><span class="text-neutral-500 font-semibold animate-pulse">Loading Diary...</span></div>
    </div>

    <!-- Quote Section -->
    <div class="py-10 px-6 text-center bg-gradient-to-b from-neutral-900/50 to-transparent">
        <p id="quoteText" class="text-xl md:text-3xl font-bold italic text-white tracking-wide">"..."</p>
    </div>

    <!-- Categories Section -->
    <main id="categoriesContainer" class="p-6 md:px-12 space-y-16"></main>

    <script>
        async function loadData() {
            const res = await fetch('/api/data');
            const data = await res.json();
            
            // Setup Banners
            const bannerContainer = document.getElementById('bannerContainer');
            if (data.banners && data.banners.length > 0) {
                let currentIdx = 0;
                bannerContainer.innerHTML = `<img src="${data.banners[0]}" class="w-full h-full object-cover slider-img opacity-80" id="bannerImg" />
                                             <div class="absolute inset-0 bg-gradient-to-t from-[#050505] to-transparent"></div>`;
                setInterval(() => {
                    currentIdx = (currentIdx + 1) % data.banners.length;
                    document.getElementById('bannerImg').src = data.banners[currentIdx];
                }, 4000);
            }

            // Setup Quote
            document.getElementById('quoteText').innerHTML = `<span class="text-[#00e5ff]">"</span>${data.quote || 'Keep pushing forward.'}<span class="text-[#00e5ff]">"</span>`;

            // Setup Categories
            const catContainer = document.getElementById('categoriesContainer');
            const vids = data.videos || [];
            const grouped = {};
            vids.forEach(v => {
                if(!grouped[v.category]) grouped[v.category] = [];
                grouped[v.category].push(v);
            });

            catContainer.innerHTML = '';
            for (const [catName, catVids] of Object.entries(grouped)) {
                const displayVids = catVids.slice(0, 5);
                const hasMore = catVids.length > 5;

                let cardsHtml = displayVids.map(v => `
                    <a href="/player.html?id=${v.id}" class="w-[280px] md:w-[360px] aspect-video relative block flex-shrink-0 bg-neutral-900 rounded-xl overflow-hidden snap-start video-card">
                        <img src="${v.thumb}" class="absolute inset-0 w-full h-full object-cover" />
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                        <div class="absolute bottom-0 left-0 p-4 w-full">
                            <span class="inline-block px-2 py-1 bg-[#00e5ff]/20 text-[#00e5ff] text-[10px] font-bold rounded mb-2">${v.date}</span>
                            <h3 class="text-base md:text-lg font-bold truncate text-white drop-shadow-md">${v.title}</h3>
                        </div>
                    </a>
                `).join('');

                if (hasMore) {
                    cardsHtml += `
                    <a href="/category.html?c=${encodeURIComponent(catName)}" class="w-[180px] aspect-video flex-shrink-0 border-2 border-neutral-800 flex flex-col items-center justify-center snap-start rounded-xl hover:border-[#00e5ff] hover:shadow-[0_0_15px_#00e5ff] transition-all text-neutral-400 hover:text-[#00e5ff] group">
                        <svg class="w-8 h-8 mb-2 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        <span class="text-sm font-bold uppercase tracking-widest">View All</span>
                    </a>
                    `;
                }

                catContainer.innerHTML += `
                    <section>
                        <h2 class="text-2xl font-extrabold tracking-widest uppercase mb-6 pl-4 neon-border-l text-white">${catName}</h2>
                        <div class="flex overflow-x-auto gap-6 hide-scroll snap-x snap-mandatory pb-6 px-2">
                            ${cardsHtml}
                        </div>
                    </section>
                `;
            }
        }
        loadData();
    </script>
</body>
</html>
