<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masoom Ki Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .crystal-header { background: rgba(0, 0, 0, 0.7); border-b: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .crystal-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .crystal-card:hover { border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 0 25px rgba(255, 255, 255, 0.1); transform: translateY(-4px); }
        .red-line { border-left: 3px solid #ff003c; }
    </style>
</head>
<body class="pb-20">
    <!-- Header -->
    <header class="flex justify-between items-center p-5 md:px-10 crystal-header sticky top-0 z-50">
        <h1 class="text-xl font-extrabold tracking-widest uppercase text-white">Masoom Ki Diary<span class="text-[#ff003c]">.</span></h1>
        <a href="/admin.html" class="text-xs font-bold text-neutral-400 hover:text-white transition-colors bg-white/5 border border-white/10 px-3 py-1.5 rounded-md">Admin</a>
    </header>

    <!-- Full Image Adaptive Banner Box -->
    <div id="bannerContainer" class="w-full bg-neutral-950 flex items-center justify-center border-b border-white/5">
        <div class="py-20"><span class="text-neutral-500 font-bold tracking-widest text-xs animate-pulse">LOADING PORTFOLIO...</span></div>
    </div>

    <!-- Minimal Quote (systematic: fixed vertical rhythm + consistent max-width across screens) -->
    <div class="w-full flex justify-center px-6 md:px-10 py-10 md:py-16">
        <p id="quoteText" class="opacity-0 translate-y-2 transition-all duration-700 ease-out text-base md:text-2xl font-medium text-neutral-300 text-center max-w-xl md:max-w-3xl leading-relaxed md:leading-relaxed tracking-wide">"..."</p>
    </div>

    <!-- Main Content -->
    <main id="categoriesContainer" class="p-6 md:px-12 space-y-16"></main>

   <!-- index.html ka Script aur Banner Section -->
<script>
    async function loadData() {
        // FIX 1: Cache buster lagaya hai (Date.now) taaki delete hone ke baad humesha fresh data load ho
        const res = await fetch('/api/data?t=' + Date.now());
        const data = await res.json();
        
        const bannerContainer = document.getElementById('bannerContainer');
        const validBanners = (data.banners || []).filter(url => url && url.trim() !== '');

        if (validBanners.length > 0) {
            let currentIdx = 0;

            // Banner hamesha FULL WIDTH rahega. Container div ka structure fixed hai;
            // sirf uski HEIGHT smart engine se decide hoti hai (neeche BannerAI).
            bannerContainer.innerHTML = `
            <div id="bannerBox" class="w-full relative bg-black overflow-hidden transition-[height] duration-500 ease-in-out">
                <img src="${validBanners[0]}" id="bannerImg" alt="Banner"
                     class="w-full h-full object-cover block transition-opacity duration-700 ease-in-out opacity-0" />

                <!-- Systematic Bottom Fade (Netflix style, container height ke proportion me) -->
                <div class="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-black via-black/70 to-transparent pointer-events-none z-10"></div>
                <div class="absolute bottom-0 left-0 w-full h-4 bg-black z-20"></div>
            </div>`;

            // ---- BannerAI: chhota engine jo image ke asli aspect-ratio ke hisaab se ----
            // banner ki height decide karta hai. Full-width hamesha guaranteed, aur agar
            // image aese ratio ki hai ki poori dikhne par height reasonable rahe, to woh
            // poori (uncropped) dikhti hai — warna sirf utna hi crop karta hai jitna zaroori ho.
            const BannerAI = {
                box: document.getElementById('bannerBox'),
                img: document.getElementById('bannerImg'),
                cache: {}, // naturalWidth/Height cache per image url

                bounds() {
                    const vw = window.innerWidth, vh = window.innerHeight;
                    const mobile = vw < 768;
                    return {
                        vw,
                        min: mobile ? vh * 0.32 : vh * 0.40,
                        max: mobile ? vh * 0.62 : vh * 0.82
                    };
                },

                async getRatio(url) {
                    if (this.cache[url]) return this.cache[url];
                    const ratio = await new Promise(resolve => {
                        const probe = new Image();
                        probe.onload = () => resolve(probe.naturalWidth / probe.naturalHeight);
                        probe.onerror = () => resolve(16 / 9); // safe fallback
                        probe.src = url;
                    });
                    this.cache[url] = ratio;
                    return ratio;
                },

                async apply(url) {
                    const ratio = await this.getRatio(url);
                    const { vw, min, max } = this.bounds();
                    const idealHeight = vw / ratio; // agar full width + full image dikhani ho to yeh height chahiye

                    let finalHeight = Math.min(Math.max(idealHeight, min), max);
                    this.box.style.height = finalHeight + 'px';

                    // Ratio reasonable range me hai to POORI image dikhao (contain), warna cover karo
                    const fitsFully = idealHeight >= min && idealHeight <= max;
                    this.img.classList.toggle('object-contain', fitsFully);
                    this.img.classList.toggle('object-cover', !fitsFully);
                }
            };

            const showBanner = async (url) => {
                await BannerAI.apply(url);
                BannerAI.img.src = url;
                requestAnimationFrame(() => BannerAI.img.classList.remove('opacity-0'));
            };

            showBanner(validBanners[0]);

            // Screen resize/rotate hone par height dobara systematic recalculate hoti hai
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => BannerAI.apply(validBanners[currentIdx]), 200);
            });

            if (validBanners.length > 1) {
                setInterval(() => {
                    BannerAI.img.classList.add('opacity-0');
                    setTimeout(async () => {
                        currentIdx = (currentIdx + 1) % validBanners.length;
                        await showBanner(validBanners[currentIdx]);
                    }, 500);
                }, 4000);
            }
        } else {
            bannerContainer.style.display = 'none';
        }

        // Setup Quote (systematic fade-in once text is ready)
        const quoteEl = document.getElementById('quoteText');
        quoteEl.textContent = data.quote ? `"${data.quote}"` : `"Keep it simple, keep it raw."`;
        requestAnimationFrame(() => {
            quoteEl.classList.remove('opacity-0', 'translate-y-2');
        });

        // Setup Categories (Same as before...)
        const catContainer = document.getElementById('categoriesContainer');
        const vids = data.videos || [];
        const grouped = {};
        vids.forEach(v => {
            if(!grouped[v.category]) grouped[v.category] = [];
            grouped[v.category].push(v);
        });

        catContainer.innerHTML = '';
        for (const [catName, catVids] of Object.entries(grouped)) {
            const displayVids = catVids.slice(0, 5);
            const hasMore = catVids.length > 5;

            let cardsHtml = displayVids.map(v => {
                const mediaElement = v.thumb ? 
                    `<img src="${v.thumb}" class="absolute inset-0 w-full h-full object-cover" />` : 
                    `<video src="${v.url}#t=1" preload="metadata" muted playsinline class="absolute inset-0 w-full h-full object-cover"></video>`;

                return `
                <a href="/player.html?id=${v.id}" class="w-[260px] md:w-[320px] aspect-[4/5] relative block flex-shrink-0 rounded-2xl overflow-hidden snap-start crystal-card">
                    ${mediaElement}
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-5 w-full z-10">
                        <span class="inline-block px-2 py-0.5 bg-[#ff003c] text-white text-[9px] font-extrabold rounded mb-2 uppercase tracking-widest">${v.date || 'REEL'}</span>
                        <h3 class="text-sm font-bold text-white tracking-wide truncate">${v.title}</h3>
                    </div>
                </a>`;
            }).join('');

            if (hasMore) {
                cardsHtml += `
                <a href="/category.html?c=${encodeURIComponent(catName)}" class="w-[160px] aspect-[4/5] flex-shrink-0 bg-white/5 border border-white/10 flex flex-col items-center justify-center snap-start rounded-2xl hover:border-white transition-all text-neutral-400 hover:text-white">
                    <span class="text-xs font-bold uppercase tracking-widest">View All →</span>
                </a>`;
            }

            catContainer.innerHTML += `
                <section class="relative z-20 -mt-4">
                    <h2 class="text-xl font-extrabold tracking-widest uppercase mb-6 pl-3 red-line text-white">${catName}</h2>
                    <div class="flex overflow-x-auto gap-6 hide-scroll snap-x snap-mandatory pb-4">
                        ${cardsHtml}
                    </div>
                </section>
            `;
        }
    }
    loadData();
</script>
</body>
</html>
