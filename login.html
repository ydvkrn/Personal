<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masoom Ki Diary - Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Poppins', sans-serif; }
        .crystal-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .crystal-input:focus { border-color: #ff003c; box-shadow: 0 0 15px rgba(255, 0, 60, 0.4); outline: none; }
        .crystal-btn { background: #ff003c; color: #fff; box-shadow: 0 0 15px rgba(255, 0, 60, 0.4); transition: all 0.3s ease; }
        .crystal-btn:hover { background: #fff; color: #000; box-shadow: 0 0 25px rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-radial-gradient">
    <div class="w-full max-w-md p-10 crystal-box rounded-3xl text-center mx-4">
        <h1 class="text-3xl font-extrabold mb-2 tracking-widest uppercase text-white">Masoom Ki Diary</h1>
        <p class="text-xs font-semibold tracking-widest text-neutral-500 mb-8 uppercase">Personal Portal</p>
        <form id="loginForm" class="space-y-6">
            <input type="password" id="passcode" maxlength="8" placeholder="••••••••" required
                class="w-full bg-black/50 border border-neutral-800 text-center text-2xl py-3 rounded-xl text-white tracking-[0.3em] crystal-input transition-all font-mono">
            <button type="submit" id="submitBtn" class="w-full font-bold text-sm py-4 rounded-xl crystal-btn uppercase tracking-widest">
                Unlock Diary
            </button>
            <p id="errorMsg" class="text-[#ff003c] font-bold text-xs hidden mt-2 tracking-wider"></p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('errorMsg');
            const pass = document.getElementById('passcode').value;
            
            btn.textContent = "VERIFYING...";
            const res = await fetch('/api/auth', {
                method: 'POST', body: JSON.stringify({ passcode: pass }),
                headers: { 'Content-Type': 'application/json' }
            });

            if (res.ok) window.location.href = '/';
            else {
                error.textContent = "INVALID PASSCODE";
                error.classList.remove('hidden');
                btn.textContent = "UNLOCK DIARY";
            }
        });
    </script>
</body>
</html>
