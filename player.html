<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing - Masoom Ki Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background-color: #000; color: #fff; font-family: 'Poppins', sans-serif; }
        :root { --plyr-color-main: #ff003c; --plyr-video-background: #000; --plyr-menu-background: #111; }
        .crystal-player { border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="p-5 border-b border-white/5 bg-black/50 backdrop-blur-md flex items-center justify-between">
        <a href="/" class="text-xs font-bold bg-white/5 border border-white/10 px-4 py-2 rounded-md text-neutral-400 hover:text-white transition-all">← CLOSE</a>
        <span class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Masoom Ki Diary</span>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-4xl crystal-player rounded-2xl overflow-hidden bg-black">
            <video id="player" playsinline controls class="w-full aspect-video object-cover"></video>
        </div>
        <div class="w-full max-w-4xl mt-6 px-2">
            <div class="flex items-center gap-3 mb-2">
                <span id="vidCat" class="border border-[#ff003c] text-[#ff003c] px-2.5 py-0.5 rounded text-[10px] font-extrabold uppercase tracking-widest"></span>
                <span id="vidDate" class="text-xs font-bold text-neutral-500"></span>
            </div>
            <h1 id="vidTitle" class="text-2xl md:text-3xl font-extrabold text-white tracking-wide">Loading...</h1>
        </div>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const player = new Plyr('#player');
        const vidId = new URLSearchParams(window.location.search).get('id');

        async function loadVideo() {
            const res = await fetch('/api/data');
            const data = await res.json();
            const video = (data.videos || []).find(v => v.id === vidId);

            if (video) {
                document.getElementById('vidTitle').textContent = video.title;
                document.getElementById('vidDate').textContent = video.date;
                document.getElementById('vidCat').textContent = video.category;
                
                player.source = { type: 'video', title: video.title, sources: [{ src: video.url, type: 'video/mp4' }], poster: video.thumb || "" };
            } else {
                document.getElementById('vidTitle').textContent = "Video Not Found";
            }
        }
        loadVideo();
    </script>
</body>
</html>
