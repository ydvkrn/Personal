<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        /* Custom B&W Theme for Plyr */
        :root { --plyr-color-main: #ffffff; --plyr-video-background: #000; --plyr-menu-background: #111; --plyr-menu-color: #fff; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="p-6 flex items-center justify-between border-b border-neutral-900">
        <a href="/" class="text-neutral-500 hover:text-white">← Close</a>
        <p id="vidDate" class="text-xs text-neutral-500"></p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-4xl bg-neutral-900 rounded-md overflow-hidden shadow-2xl">
            <video id="player" playsinline controls class="w-full"></video>
        </div>
        <div class="w-full max-w-4xl mt-6">
            <h1 id="vidTitle" class="text-2xl font-bold mb-2">Loading...</h1>
            <span id="vidCat" class="inline-block border border-neutral-700 px-3 py-1 text-xs uppercase tracking-widest text-neutral-400"></span>
        </div>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const player = new Plyr('#player');
        const urlParams = new URLSearchParams(window.location.search);
        const vidId = urlParams.get('id');

        async function loadVideo() {
            const res = await fetch('/api/data');
            const data = await res.json();
            const video = (data.videos || []).find(v => v.id === vidId);

            if (video) {
                document.getElementById('vidTitle').textContent = video.title;
                document.getElementById('vidDate').textContent = video.date;
                document.getElementById('vidCat').textContent = video.category;
                
                // Set Video Source
                player.source = {
                    type: 'video',
                    title: video.title,
                    sources: [{ src: video.url, type: 'video/mp4' }],
                    poster: video.thumb
                };
            } else {
                document.getElementById('vidTitle').textContent = "Video Not Found";
            }
        }
        loadVideo();
    </script>
</body>
</html>
